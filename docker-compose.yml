services:
  training:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: ml-training
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
       # Mount project code
       - ./src:/app/src
       - ./configs:/app/configs
       - ./data:/app/data
       - ./outputs:/app/outputs
       - ./scripts:/app/scripts
       # Mount model cache to avoid re-downloading
       - C:/Users/Guy/.cache/huggingface:/root/.cache/huggingface
       # Mount checkpoints for GGUF model access
       - ./checkpoints:/app/checkpoints
       # Mount Studio exports (SFT checkpoint, GGUF, etc.)
       - C:/Users/Guy/.unsloth/studio/exports:/studio/exports
    env_file:
      - .env
    environment:
      - HF_HOME=/root/.cache/huggingface
      - TRANSFORMERS_CACHE=/root/.cache/huggingface
      - DATASETS_CACHE=/root/.cache/huggingface
      - ACCELERATE_CACHE_DIR=/root/.cache/huggingface
      - CUDA_VISIBLE_DEVICES=0
      - PYTORCH_CUDA_ALLOC_CONF=max_split_size_mb:512
      - TRACKIO_SERVER_URL=${TRACKIO_SERVER_URL}
      - TRACKIO_WRITE_TOKEN=${TRACKIO_WRITE_TOKEN}
      - TRACKIO_PROJECT=${TRACKIO_PROJECT}
    shm_size: '16gb'
    stdin_open: true
    tty: true
    restart: unless-stopped

  sglang:
    image: lmsysorg/sglang:latest
    container_name: sglang-server
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "1235:30000"
    volumes:
      - C:/Users/Guy/.cache/huggingface:/root/.cache/huggingface
      - C:/Users/Guy/.unsloth/studio/exports:/studio/exports
    environment:
      - HF_HOME=/root/.cache/huggingface
      - HF_TOKEN=${HF_TOKEN}
      - SGLANG_ENABLE_CUDA_GRAPH=false
    shm_size: '16gb'
    restart: "no"
    command: >
      --model-path Qwen/Qwen3.5-4B
      --host 0.0.0.0
      --port 30000
      --mem-fraction-static 0.6
      --cuda-memory-fraction 0.6

  trackio:
    build:
      context: docker/trackio
      dockerfile: Dockerfile
    container_name: trackio-server
    ports:
      - "7860:7860"
    volumes:
      - trackio-data:/root/.cache/huggingface/trackio
    environment:
      - TRACKIO_WRITE_TOKEN=${TRACKIO_WRITE_TOKEN}
    restart: unless-stopped

volumes:
  trackio-data:
