# Benchmark suite configuration for Qwen3.5-9B evaluation
# Used by lm_eval --tasks benchmark_suite

group: dm_alignment_suite
task:
  - name: mmlu_pro
    task: mmlu_pro
    metric_list:
      - metric: acc
        aggregation: mean
        higher_is_better: true
  - name: gpqa_diamond_zeroshot
    task: gpqa_diamond_zeroshot
    should_decontaminate: true
    metric_list:
      - metric: acc
        aggregation: mean
        higher_is_better: true
  - name: ifeval
    task: ifeval
    metric_list:
      - metric: prompt_level_strict_accuracy
        aggregation: mean
        higher_is_better: true
  - name: humaneval
    task: humaneval
    metric_list:
      - metric: pass@1
        aggregation: mean
        higher_is_better: true
  - name: leaderboard_math_hard
    task: leaderboard_math_hard
    metric_list:
      - metric: exact_match
        aggregation: mean
        higher_is_better: true
