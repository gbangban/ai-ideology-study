# Corr2Cause: Causal inference from statistical correlations.
# Source: https://huggingface.co/datasets/causal-nlp/corr2cause
#
# Binary classification: given correlation/independence statements (premise),
# determine whether a causal hypothesis is True or False.
# Test split: ~1,160 samples.

task: corr2cause
dataset_path: causal-nlp/corr2cause
dataset_name: default
test_split: test
output_type: generate_until
doc_to_text: "Answer with only the word True or False. Do not include reasoning, thinking, or any explanation.\n\n{{input}}\n\nDoes the premise support the causal hypothesis?"
doc_to_target: "{{'True' if label == 1 else 'False'}}"
process_results: !function corr2cause.process_results
generation_kwargs:
  until:
    - "\n\n"
    - "</s>"
    - "\n"
  max_gen_toks: 16
  do_sample: false
metric_list:
  - metric: acc
    aggregation: mean
    higher_is_better: true
num_fewshot: 0
metadata:
  version: 1.0
